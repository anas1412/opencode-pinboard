name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer binary
        run: bun run build:installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinboard-install-${{ matrix.os }}
          path: dist/pinboard-install*

  release:
    name: Create release
    needs: [build-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pinboard-install-*
          merge-multiple: true

      - name: Rename installer binaries with platform suffix
        shell: bash
        run: |
          mv pinboard-install      pinboard-install-linux   || true
          mv pinboard-install.exe  pinboard-install-windows.exe || true

      - name: Clean stale release assets (from failed prior runs)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --json assets &>/dev/null; then
            echo "Cleaning stale release assets..."
            gh release view "$TAG" --json assets -q '.assets[].apiUrl | split("/") | last' | while read -r id; do
              echo "  deleting asset $id..."
              gh api -X DELETE "/repos/${{ github.repository }}/releases/assets/$id" --silent || true
            done
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pinboard-install-*
          generate_release_notes: true
